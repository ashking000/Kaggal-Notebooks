name: 🔐 Purge Secrets from Git History

on:
  workflow_dispatch:
    inputs:
      confirm_purge:
        description: 'Type YES to confirm secret purge (CANNOT BE UNDONE)'
        required: true
        type: string
      
jobs:
  purge-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Validate Confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_purge }}" != "YES" ]]; then
            echo "❌ Confirmation not received. Aborting."
            exit 1
          fi
          echo "✅ Confirmed. Proceeding with secret purge..."

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git Config
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Install git-filter-repo
        run: |
          pip install git-filter-repo

      - name: Create Patterns File
        run: |
          cat > patterns.txt << 'EOF'
          # Kaggle Credentials
          ash17king0==>REDACTED
          (?i)(kaggle[_-]?key)==>REDACTED
          (?i)(kaggle[_-]?username)==>REDACTED
          
          # HuggingFace Tokens
          hf_[A-Za-z0-9]{34,}==>REDACTED
          
          # Zrok Tokens
          zrok_[A-Za-z0-9]{20,}==>REDACTED
          
          # Docker Tokens
          dckr_[A-Za-z0-9]{20,}==>REDACTED
          
          # OpenAI Keys
          sk-[A-Za-z0-9]{20,}==>REDACTED
          EOF

      - name: Run git-filter-repo
        run: |
          pip install git-filter-repo
          git filter-repo --replace-text patterns.txt --force

      - name: Create .gitignore
        run: |
          cat > .gitignore << 'EOF'
          .env
          .env.local
          secrets.json
          .kaggle/
          .huggingface/
          *_keys.ipynb
          *_tokens.ipynb
          .ipynb_checkpoints/
          EOF
          git add .gitignore
          git commit -m "chore: add .gitignore to prevent future credential leaks"

      - name: Git Cleanup & Push
        run: |
          git reflog expire --expire=now --all
          git gc --prune=now --aggressive
          git push origin --force-with-lease --all
          git push origin --force-with-lease --tags

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: purge-report
          path: filter-repo.log
          retention-days: 30
