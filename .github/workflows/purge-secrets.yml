name: 🔐 Purge Secrets from Git History

on:
  workflow_dispatch:
    inputs:
      confirm_purge:
        description: 'Type YES to confirm secret purge (CANNOT BE UNDONE)'
        required: true
        type: string
      
jobs:
  purge-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Validate Confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_purge }}" != "YES" ]]; then
            echo "❌ Confirmation not received. Aborting."
            exit 1
          fi
          echo "✅ Confirmed. Proceeding with secret purge..."

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git Config
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Install git-filter-repo
        run: |
          pip install git-filter-repo

      - name: Create Patterns File
        run: |
          cat > patterns.txt << 'EOF'
          # Kaggle Credentials
          ash17king0==>REDACTED
          (?i)(kaggle[_-]?key)==>REDACTED
          (?i)(kaggle[_-]?username)==>REDACTED
          
          # HuggingFace Tokens
          hf_[A-Za-z0-9]{34,}==>REDACTED
          
          # Zrok Tokens
          zrok_[A-Za-z0-9]{20,}==>REDACTED
          
          # Docker Tokens
          dckr_[A-Za-z0-9]{20,}==>REDACTED
          
          # OpenAI Keys
          sk-[A-Za-z0-9]{20,}==>REDACTED
          EOF

      - name: Scan for Secrets
        continue-on-error: true
        run: |
          echo "🔍 Scanning repository for secrets..."
          if git log --all -p 2>/dev/null | grep -iE "(kaggle_key|hf_token|zrok|docker|openai|ash17king0)" > /tmp/secrets_found.txt 2>&1; then
            echo "⚠️  Potential secrets detected"
            head -20 /tmp/secrets_found.txt
          else
            echo "✅ No obvious secrets found (proceeding with purge anyway)"
          fi

      - name: Run git-filter-repo
        run: |
          echo "🧹 Running git-filter-repo..."
          cd ${{ github.workspace }}
          git filter-repo --replace-text patterns.txt --force 2>&1 | tee filter-repo.log
          echo "✅ git-filter-repo completed"

      - name: Reinitialize Git Remote
        run: |
          echo "🔄 Reinitializing git remote..."
          cd ${{ github.workspace }}
          
          # Remove old remote if it exists
          git remote remove origin 2>/dev/null || true
          
          # Add new remote
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Verify remote
          git remote -v
          echo "✅ Remote reinitialized"

      - name: Create .gitignore
        run: |
          cat > .gitignore << 'EOF'
          .env
          .env.local
          secrets.json
          .kaggle/
          .huggingface/
          *_keys.ipynb
          *_tokens.ipynb
          .ipynb_checkpoints/
          EOF
          cd ${{ github.workspace }}
          git add .gitignore
          git commit -m "chore: add .gitignore to prevent future credential leaks" || echo "✅ Already up to date"

      - name: Git Cleanup
        run: |
          cd ${{ github.workspace }}
          echo "🧹 Running git cleanup..."
          git reflog expire --expire=now --all
          git gc --prune=now --aggressive
          echo "✅ Git cleanup completed"

      - name: Verify Before Push
        run: |
          cd ${{ github.workspace }}
          echo "📊 Repository Status:"
          git remote -v
          git status
          git log --oneline -5

      - name: Force Push to GitHub
        run: |
          cd ${{ github.workspace }}
          echo "📤 Force pushing to GitHub..."
          git push origin --force-with-lease --all 2>&1 | tee push.log
          git push origin --force-with-lease --tags 2>&1 | tee -a push.log
          echo "✅ Push completed"

      - name: Create Summary Report
        if: always()
        run: |
          cat > PURGE_REPORT.md << 'EOF'
          # 🔐 Secret Purge Report
          
          **Date**: $(date)
          **Repository**: ashking000/Kaggal-Notebooks
          
          ## ✅ Actions Completed:
          - Repository scanned for secrets
          - git-filter-repo executed
          - Secret patterns replaced
          - .gitignore created
          - Git history cleaned
          - Remote reinitialized
          - Force-pushed to GitHub
          
          ## 📋 Next Steps:
          1. Re-clone: rm -rf Kaggal-Notebooks && git clone https://github.com/ashking000/Kaggal-Notebooks.git
          2. Regenerate all credentials:
             - Kaggle: https://www.kaggle.com/settings/account
             - HuggingFace: https://huggingface.io/settings/tokens
             - Docker: https://hub.docker.com/settings/security
          3. Use .gitignore to prevent future leaks
          
          ## 🎉 Result:
          All secrets purged from git history!
          EOF
          cat PURGE_REPORT.md

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: purge-report
          path: |
            PURGE_REPORT.md
            filter-repo.log
            push.log
          retention-days: 30

      - name: Workflow Complete
        if: always()
        run: |
          echo "✅ Workflow execution completed!"
          echo "Check the artifacts for detailed reports."
